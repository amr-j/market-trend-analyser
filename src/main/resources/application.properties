spring.application.name=market-trend-analyser

# API Mode (mock or real)
stock.api.mode=mock

spring.jpa.open-in-view=false

# Alpha Vantage (only required when stock.api.mode=real)
alphavantage.api.key=your-key-here
alphavantage.api.base-url=https://www.alphavantage.co/query

# Resilience4j Rate Limiter (Alpha Vantage free tier: 25 req/day, 5 req/min)
resilience4j.ratelimiter.instances.alphavantage.limit-for-period=5
resilience4j.ratelimiter.instances.alphavantage.limit-refresh-period=1m
resilience4j.ratelimiter.instances.alphavantage.timeout-duration=5s

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/market_analyser
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=market-analyser
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.amraljundi.analyser.event
spring.kafka.listener.ack-mode=manual

# ShedLock
shedlock.defaults.lock-at-most-for=PT1H
shedlock.defaults.lock-at-least-for=PT30M

# Job Configuration
job.symbols=AAPL,GOOGL,MSFT,AMZN,META
job.lookback-days=14