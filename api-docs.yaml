openapi: 3.1.0
info:
  title: Market Trend Analyser
  description: Fetches stock price data via a scheduled job, publishes to Kafka, and stores momentum analysis in PostgreSQL for querying.
  version: 2.0.0
servers:
  - url: http://localhost:8080
    description: Local server
paths:
  /api/analysis/momentum:
    get:
      summary: Get momentum analysis
      description: Returns momentum analysis for the given symbols over a date range.
      operationId: getMomentum
      parameters:
        - name: symbols
          in: query
          required: true
          description: 1 to 10 stock symbols
          example: AAPL,GOOGL,MSFT
          schema:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 10
        - name: from
          in: query
          required: true
          description: Start date (inclusive)
          example: "2024-01-01"
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          description: End date (inclusive)
          example: "2024-01-14"
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Momentum report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketTrendReport"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    MarketTrendReport:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        stockMomentums:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/MarketAnalysis"
    MarketAnalysis:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        direction:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        percentChange:
          type: number
          description: Price change percentage over the momentum period
        analyzedAt:
          type: string
          format: date
    ErrorResponse:
      type: object
      properties:
        message:
          type: string